<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Log Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #00ff00;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }

        .warning {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 2px solid #00ff00;
            background: #0a0a0a;
            color: #00ff00;
            cursor: pointer;
            border-radius: 5px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00ff00;
            color: #0a0a0a;
        }

        .btn-danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-danger:hover {
            background: #ff4444;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 5px;
            border: 2px solid #00ff00;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
        }

        .logs-container {
            background: #0a0a0a;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .log-entry {
            background: #1a1a1a;
            border: 1px solid #00ff00;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .log-entry:hover {
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff00;
        }

        .log-time {
            color: #ffaa00;
        }

        .log-ip {
            color: #00aaff;
        }

        .log-field {
            margin: 8px 0;
            display: flex;
        }

        .log-field-label {
            color: #888;
            width: 120px;
            flex-shrink: 0;
        }

        .log-field-value {
            color: #00ff00;
            word-break: break-all;
        }

        .password-value {
            background: #ff4444;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
        }

        .no-logs {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 18px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }

        /* Scrollbar styling */
        .logs-container::-webkit-scrollbar {
            width: 10px;
        }

        .logs-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .logs-container::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 5px;
        }

        .user-agent {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚠️ PHISHING SIMULATOR - ADMIN PANEL</h1>
            <p style="text-align: center; color: #888;">Log Monitoring Dashboard</p>
        </header>

        <div class="warning">
            ⚠️ Bu panel sadece eğitim amaçlıdır. Yakalanan bilgiler gerçek sistemlerde kullanılmamalıdır.
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Toplam Deneme</div>
                <div class="stat-value" id="totalAttempts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Benzersiz IP</div>
                <div class="stat-value" id="uniqueIPs">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Son Aktivite</div>
                <div class="stat-value" id="lastActivity" style="font-size: 14px;">-</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="refreshLogs()">🔄 Yenile</button>
            <button class="btn" onclick="exportLogs()">📥 Export JSON</button>
            <button class="btn btn-danger" onclick="clearLogs()">🗑️ Logları Temizle</button>
            <button class="btn" onclick="toggleAutoRefresh()">⏱️ <span id="autoRefreshText">Auto-Refresh: OFF</span></button>
        </div>

        <div class="logs-container" id="logsContainer">
            <div class="loading">Loglar yükleniyor...</div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;

        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                displayLogs(logs);
                updateStats(logs);
            } catch (error) {
                document.getElementById('logsContainer').innerHTML = 
                    '<div class="no-logs">❌ Loglar yüklenirken hata oluştu</div>';
            }
        }

        function displayLogs(logs) {
            const container = document.getElementById('logsContainer');
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="no-logs">📭 Henüz log kaydı yok</div>';
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="log-entry">
                    <div class="log-header">
                        <span class="log-time">⏰ ${log.timestamp}</span>
                        <span class="log-ip">🌐 ${log.ip}</span>
                    </div>
                    <div class="log-field">
                        <span class="log-field-label">👤 Username:</span>
                        <span class="log-field-value">${escapeHtml(log.username)}</span>
                    </div>
                    <div class="log-field">
                        <span class="log-field-label">🔑 Password:</span>
                        <span class="password-value">${escapeHtml(log.password)}</span>
                    </div>
                    <div class="user-agent">
                        <span class="log-field-label">🖥️ User-Agent:</span>
                        ${escapeHtml(log.user_agent)}
                    </div>
                </div>
            `).join('');
        }

        function updateStats(logs) {
            document.getElementById('totalAttempts').textContent = logs.length;
            
            const uniqueIPs = new Set(logs.map(log => log.ip));
            document.getElementById('uniqueIPs').textContent = uniqueIPs.size;
            
            if (logs.length > 0) {
                const lastTime = logs[0].timestamp;
                document.getElementById('lastActivity').textContent = lastTime.split(' ')[1];
            }
        }

        function refreshLogs() {
            fetchLogs();
        }

        function toggleAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                document.getElementById('autoRefreshText').textContent = 'Auto-Refresh: OFF';
            } else {
                autoRefreshInterval = setInterval(fetchLogs, 5000);
                document.getElementById('autoRefreshText').textContent = 'Auto-Refresh: ON';
            }
        }

        async function clearLogs() {
            if (!confirm('Tüm logları silmek istediğinizden emin misiniz?')) {
                return;
            }

            try {
                await fetch('/api/clear-logs', { method: 'POST' });
                fetchLogs();
                alert('✅ Loglar temizlendi');
            } catch (error) {
                alert('❌ Loglar temizlenirken hata oluştu');
            }
        }

        function exportLogs() {
            fetch('/api/logs')
                .then(response => response.json())
                .then(logs => {
                    const dataStr = JSON.stringify(logs, null, 2);
                    const dataBlob = new Blob([dataStr], {type: 'application/json'});
                    const url = URL.createObjectURL(dataBlob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `phishing_logs_${new Date().toISOString()}.json`;
                    link.click();
                });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // İlk yükleme
        fetchLogs();
    </script>
</body>
</html>
